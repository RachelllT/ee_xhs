<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EE · 小红书图文合集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --c1: #CDA18B;
  --c2: #DDD3C9;
  --c3: #C0BEC3;
  --c4: #AFC2BD;
  --c5: #1F3D4B;
  --base: #F5F5F7;
  --text-primary: #1d1d1f;
  --text-secondary: #4a4a4a;
  --text-muted: #8a8a8a;
  --card-white: rgba(255,255,255,0.82);
  --border: rgba(0,0,0,0.08);
}

html, body {
  min-height: 100vh;
  background-color: #F5F5F7;
  background-image:
    radial-gradient(rgba(31,61,75,0.025) 1px, transparent 1px),
    linear-gradient(135deg, rgba(205,161,139,0.18) 0%, rgba(221,211,201,0.18) 35%, rgba(192,190,195,0.18) 68%, rgba(175,194,189,0.18) 100%);
  background-size: 6px 6px, 100% 100%;
  background-attachment: fixed;
  font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
  color: var(--text-primary);
}

/* ─── 顶部标题区 ─── */
.hero {
  max-width: 920px;
  margin: 0 auto;
  padding: 60px 24px 32px;
  text-align: center;
}

.hero-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.hero-logo-mark {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--c5);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif;
  font-size: 18px; font-weight: 900;
  color: #fff;
}

.hero-logo-text {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  text-transform: uppercase;
}

.hero h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(28px, 5vw, 40px);
  font-weight: 900;
  color: var(--text-primary);
  line-height: 1.2;
  letter-spacing: -0.01em;
  margin-bottom: 10px;
}

.hero p {
  font-size: clamp(13px, 2vw, 15px);
  font-weight: 300;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ─── 卡片网格 ─── */
.card-grid {
  max-width: 920px;
  margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card-white);
  border-radius: 16px;
  border: 0.5px solid var(--border);
  backdrop-filter: blur(10px);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), box-shadow 0.25s ease;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}

/* 卡片渐变顶条 */
.card-banner {
  height: 6px;
  flex-shrink: 0;
}
.card:nth-child(4n+1) .card-banner { background: linear-gradient(90deg, var(--c1), rgba(205,161,139,0.4)); }
.card:nth-child(4n+2) .card-banner { background: linear-gradient(90deg, var(--c2), rgba(221,211,201,0.4)); }
.card:nth-child(4n+3) .card-banner { background: linear-gradient(90deg, var(--c3), rgba(192,190,195,0.4)); }
.card:nth-child(4n+4) .card-banner { background: linear-gradient(90deg, var(--c4), rgba(175,194,189,0.4)); }

.card-body {
  padding: 18px 20px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
}

.card-date {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.card-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.35;
  margin-bottom: 8px;
}

.card-desc {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-secondary);
  line-height: 1.65;
  flex: 1;
  margin-bottom: 14px;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.card-tag {
  font-size: 11px;
  font-weight: 500;
  color: var(--c5);
  background: rgba(31,61,75,0.08);
  padding: 3px 9px;
  border-radius: 4px;
}

/* ─── 加载/错误状态 ─── */
.status-msg {
  grid-column: 1 / -1;
  text-align: center;
  padding: 60px 0;
  font-size: 14px;
  color: var(--text-muted);
}

.status-msg.error {
  color: #c0392b;
}

/* ─── 页脚 ─── */
.footer {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: var(--text-muted);
}

/* ─── 响应式 ─── */
@media (max-width: 600px) {
  .card-grid {
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 0 16px 60px;
  }
  .hero { padding: 40px 16px 24px; }
}
</style>
</head>
<body>

<!-- 顶部标题区 -->
<header class="hero">
  <div class="hero-logo">
    <div class="hero-logo-mark">EE</div>
    <span class="hero-logo-text">小红书图文合集</span>
  </div>
  <h1>每一篇都值得被看见</h1>
  <p>这里收录我的小红书图文作品，点击卡片即可阅读全文。</p>
</header>

<!-- 卡片网格 -->
<main class="card-grid" id="cardGrid">
  <div class="status-msg">加载中…</div>
</main>

<!-- 页脚 -->
<footer class="footer">© 2026 EE · 持续更新中</footer>

<script>
const grid = document.getElementById('cardGrid');

fetch('pages.json')
  .then(res => {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(pages => {
    if (!pages || pages.length === 0) {
      grid.innerHTML = '<div class="status-msg">还没有内容，敬请期待。</div>';
      return;
    }
    grid.innerHTML = pages.map(p => `
      <a class="card" href="${p.file}">
        <div class="card-banner"></div>
        <div class="card-body">
          <div class="card-date">${p.date || ''}</div>
          <h2 class="card-title">${p.title || '无标题'}</h2>
          <p class="card-desc">${p.description || ''}</p>
          <div class="card-tags">
            ${(p.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('')}
          </div>
        </div>
      </a>
    `).join('');
  })
  .catch(err => {
    grid.innerHTML = `<div class="status-msg error">加载失败：${err.message}<br>请确保通过 HTTP 服务访问（如 GitHub Pages 或本地 python -m http.server）。</div>`;
  });
</script>
</body>
</html>
